<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Resume Analyzer</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="resumeInput" name="resume" accept=".pdf, .docx" required><br>
            <button type="button" onclick="analyzeResume()">Analyze Resume</button>
        </form>
        <div id="analysisResult"></div>
        <button id="downloadBtn" onclick="downloadPDF()">Download Formatted Resume</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
